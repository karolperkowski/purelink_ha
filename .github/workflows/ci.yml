name: CI

on:
  push:
    branches: [main]
  pull_request:

# Opt every job into Node 24 ahead of the 2026-06-02 forced cutover, so
# we discover compatibility issues now while the Node-20 fallback still
# works rather than on the day GitHub flips the switch. Remove this once
# Node 24 is the runner default.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run lint.sh
        run: |
          chmod +x ./lint.sh
          ./lint.sh

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Skip brand-assets check until a PR is merged into home-assistant/brands.
          # https://hacs.xyz/docs/publish/include#check-brands
          ignore: brands
