name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build + publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(python -c "import json; print(json.load(open('custom_components/purelink/manifest.json'))['version'])")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG_VERSION) does not match manifest.json version ($MANIFEST_VERSION). Bump the manifest before tagging."
            exit 1
          fi
          echo "Tag and manifest agree on version $TAG_VERSION."

      - name: Zip integration
        run: |
          cd custom_components/purelink
          zip -r ../../purelink.zip .
          cd ../..
          ls -la purelink.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: purelink.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
